<script type="text/javascript">
    RED.nodes.registerType('tractive-config', {
        category: 'config',
        defaults: {
            name: { value: '' }
        },
        credentials: {
            email: { type: 'text' },
            password: { type: 'password' }
        },
        label: function () {
            return this.name || 'Tractive Account';
        }
    });
</script>

<script type="text/html" data-template-name="tractive-config">
    <div class="form-row">
        <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-config-input-name" placeholder="Tractive Account">
    </div>
    <div class="form-row">
        <label for="node-config-input-email"><i class="fa fa-envelope"></i> Email</label>
        <input type="text" id="node-config-input-email" placeholder="your@email.com">
    </div>
    <div class="form-row">
        <label for="node-config-input-password"><i class="fa fa-lock"></i> Password</label>
        <input type="password" id="node-config-input-password">
    </div>
</script>

<script type="text/html" data-help-name="tractive-config">
    <p>Shared configuration node that authenticates with the Tractive API.</p>
    <p>Credentials are stored securely using the Node-RED credentials store.</p>
</script>
