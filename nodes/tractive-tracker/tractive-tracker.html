<script type="text/javascript">
    RED.nodes.registerType('tractive-tracker', {
        category: 'Tractive',
        color: '#4A90D9',
        defaults: {
            name: { value: '' },
            config: { value: '', type: 'tractive-config', required: true },
            trackerID: { value: '' },
            mode: { value: 'hardware' }
        },
        inputs: 1,
        outputs: 1,
        icon: 'font-awesome/fa-paw',
        label: function () { return this.name || 'tractive-tracker'; },
        paletteLabel: 'tracker'
    });
</script>

<script type="text/html" data-template-name="tractive-tracker">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="tractive-tracker">
    </div>
    <div class="form-row">
        <label for="node-input-config"><i class="fa fa-user"></i> Account</label>
        <input type="text" id="node-input-config">
    </div>
    <div class="form-row">
        <label for="node-input-trackerID"><i class="fa fa-crosshairs"></i> Tracker ID</label>
        <input type="text" id="node-input-trackerID" placeholder="override via msg.trackerID">
    </div>
    <div class="form-row">
        <label for="node-input-mode"><i class="fa fa-list"></i> Mode</label>
        <select id="node-input-mode">
            <option value="hardware">Hardware (battery, signal)</option>
            <option value="info">Tracker info</option>
        </select>
    </div>
</script>

<script type="text/html" data-help-name="tractive-tracker">
    <p>Get tracker information or hardware status from a Tractive tracker.</p>
    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt class="optional">trackerID <span class="property-type">string</span></dt>
        <dd>Overrides the Tracker ID set in the node config.</dd>
    </dl>
    <h3>Outputs</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">object</span></dt>
        <dd>Hardware mode: <code>battery_level</code>, <code>charging_state</code>, signal info.<br>
        Info mode: tracker model, firmware, and settings.</dd>
    </dl>
</script>
