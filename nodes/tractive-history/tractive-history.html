<script type="text/javascript">
    RED.nodes.registerType('tractive-history', {
        category: 'Tractive',
        color: '#4A90D9',
        defaults: {
            name: { value: '' },
            config: { value: '', type: 'tractive-config', required: true },
            trackerID: { value: '' },
            hours: { value: 24, validate: RED.validators.number() }
        },
        inputs: 1,
        outputs: 1,
        icon: 'font-awesome/fa-history',
        label: function () { return this.name || 'tractive-history'; },
        paletteLabel: 'history'
    });
</script>

<script type="text/html" data-template-name="tractive-history">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="tractive-history">
    </div>
    <div class="form-row">
        <label for="node-input-config"><i class="fa fa-user"></i> Account</label>
        <input type="text" id="node-input-config">
    </div>
    <div class="form-row">
        <label for="node-input-trackerID"><i class="fa fa-crosshairs"></i> Tracker ID</label>
        <input type="text" id="node-input-trackerID" placeholder="override via msg.trackerID">
    </div>
    <div class="form-row">
        <label for="node-input-hours"><i class="fa fa-clock-o"></i> Window (hours)</label>
        <input type="number" id="node-input-hours" min="1" max="168" style="width:80px"> hours
    </div>
</script>

<script type="text/html" data-help-name="tractive-history">
    <p>Returns location history for a tracker over a time window.</p>
    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt class="optional">trackerID <span class="property-type">string</span></dt>
        <dd>Overrides the Tracker ID set in the node config.</dd>
        <dt class="optional">from <span class="property-type">number | string</span></dt>
        <dd>Start of window as timestamp (ms) or ISO date string. Defaults to <em>now minus window</em>.</dd>
        <dt class="optional">to <span class="property-type">number | string</span></dt>
        <dd>End of window. Defaults to now.</dd>
    </dl>
    <h3>Outputs</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">array</span></dt>
        <dd>Array of location history entries.</dd>
    </dl>
</script>
